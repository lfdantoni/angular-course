<div class="box">
  <h2>Data Binding</h2>
  <p>
    Interpolation:
    <b>
      {{title}}
    </b>
  </p>
  <hr>

  <p>
    Template Expressions:
    <b>
      {{ title + ' Template Expressions'}}
    </b>
  </p>
  <hr>

  <p>
    Template Statements:
    <b>
      {{ greeting }}
    </b>
    <button (click)="sayHello()">Greeting</button>
  </p>

  <hr>
  <p>
    One-way data source:
    <br>
    <b>
      {{ title }}
    </b>
    <br>
    <input [value]="title" />
  </p>
  <hr>

  <p>
    Event binding
    <br>
    <b>
      {{ inputValue }}
    </b>
    <br>
    <input (input)="onChange($event.target.value)" />
  </p>
  <hr>

  <p>
    Two-way data binding: <b>[(property)]</b> "Banana in a box"
    <br>
    <i>We will see it on the Form example</i>
  </p>
</div>
